{% extends "base.html" %}
{% block content %}
<h3>Add Expense</h3>
<form method="post" action="{{ url_for('addexpenses') }}">
  <div class="mb-3">
    <label>Place</label>
    <input class="form-control" name="dname" required>
  </div>
  <div class="mb-3">
    <label>Email</label>
    <input class="form-control" name="demail" type="email" required>
  </div>
  <div class="mb-3">
    <label>Product</label>
    <input class="form-control" name="Product" required>
  </div>
  <div class="mb-3">
    <label>Expense (numeric)</label>
    <input class="form-control" name="expense" type="number" step="0.01" required>
  </div>
  <button class="btn btn-success">Add</button>
</form>
{% endblock %}
